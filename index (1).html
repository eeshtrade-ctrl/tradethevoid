<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID Engine — Trade The Void</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #000000;
    --white: #ffffff;
    --gray-100: #f5f5f5;
    --gray-300: #a0a0a0;
    --gray-500: #666666;
    --gray-700: #2a2a2a;
    --gray-800: #1a1a1a;
    --gray-900: #0d0d0d;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    cursor: none;
  }

  /* Canvas layers */
  #voidCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }



  /* Custom cursor */
  .cursor-dot {
    position: fixed;
    width: 6px;
    height: 6px;
    background: var(--white);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
  }



  /* Diagonal line background texture */
  .bg-lines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.012) 40px,
      rgba(255,255,255,0.012) 41px
    );
    pointer-events: none;
    z-index: 2;
  }

  .page {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
  }

  /* Logo */
  .logo-container {
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.3s forwards;
  }

  .logo-container img {
    width: 180px;
    height: auto;
    transition: filter 0.3s ease;
  }

  .logo-container:hover img {
    filter: brightness(1.15) drop-shadow(0 0 40px rgba(255,255,255,0.15));
  }

  /* Brand name */
  .brand {
    font-family: 'Space Mono', monospace;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.5s forwards;
  }

  /* Tagline */
  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: clamp(12px, 2vw, 16px);
    font-weight: 400;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gray-300);
    margin-bottom: 64px;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.7s forwards;
  }

  /* Divider */
  .divider {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, var(--gray-500), transparent);
    margin-bottom: 64px;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.8s forwards;
  }

  /* Waitlist */
  .waitlist {
    text-align: center;
    max-width: 480px;
    width: 100%;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.9s forwards;
  }

  .waitlist-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gray-500);
    margin-bottom: 24px;
  }

  .waitlist-desc {
    font-size: 16px;
    font-weight: 300;
    color: var(--gray-300);
    line-height: 1.7;
    margin-bottom: 36px;
  }

  .input-group {
    display: flex;
    gap: 0;
    width: 100%;
    border: 1px solid var(--gray-700);
    border-radius: 2px;
    overflow: hidden;
    transition: border-color 0.3s ease;
  }

  .input-group:focus-within {
    border-color: var(--gray-300);
  }

  .input-group input {
    flex: 1;
    background: rgba(13,13,13,0.8);
    backdrop-filter: blur(10px);
    border: none;
    padding: 16px 20px;
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.02em;
    outline: none;
    cursor: none;
  }

  .input-group input::placeholder {
    color: var(--gray-500);
    letter-spacing: 0.05em;
  }

  .input-group button {
    background: var(--white);
    color: var(--black);
    border: none;
    padding: 16px 28px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: none;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .input-group button:hover {
    background: var(--gray-100);
  }

  .input-group button:active {
    transform: scale(0.98);
  }

  .success-msg {
    display: none;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--gray-300);
    margin-top: 20px;
    padding: 16px;
    border: 1px solid var(--gray-700);
    border-radius: 2px;
  }

  .success-msg.visible {
    display: block;
    animation: fadeUp 0.5s ease-out forwards;
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 32px;
    align-items: center;
    opacity: 0;
    animation: fadeUp 1s ease-out 1.1s forwards;
  }

  .footer-link {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-500);
    text-decoration: none;
    transition: color 0.3s ease;
    cursor: none;
  }

  .footer-link:hover { color: var(--white); }

  .footer-dot {
    width: 3px;
    height: 3px;
    background: var(--gray-700);
    border-radius: 50%;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 520px) {
    .input-group { flex-direction: column; }
    .input-group button { padding: 14px 20px; }
    .logo-container img { width: 140px; }
    .footer { gap: 20px; }
    body { cursor: auto; }
    .cursor-dot { display: none; }
  }
</style>
</head>
<body>

<canvas id="voidCanvas"></canvas>

<div class="bg-lines"></div>
<div class="cursor-dot" id="cursorDot"></div>

<main class="page">
  <div class="logo-container">
    <img src="void-logo.jpeg" alt="VOID Engine Logo">
  </div>

  <h1 class="brand">VOID Engine</h1>
  <p class="tagline">Trade The Void</p>

  <div class="divider"></div>

  <div class="waitlist">
    <p class="waitlist-label">Early Access</p>
    <p class="waitlist-desc">Autonomous orderflow intelligence for ES futures. Join the waitlist to get first access when we launch.</p>

    <div class="input-group" id="inputGroup">
      <input type="email" id="emailInput" placeholder="you@email.com" autocomplete="email" />
      <button id="submitBtn" onclick="handleSubmit()">Join Waitlist</button>
    </div>

    <div class="success-msg" id="successMsg">
      &#10003; &nbsp;You're on the list. We'll be in touch.
    </div>
  </div>

  <div class="footer">
    <a href="https://instagram.com/es.eesh" target="_blank" class="footer-link">Instagram</a>
    <div class="footer-dot"></div>
    <span class="footer-link">2026</span>
  </div>
</main>

<script>
  // ========== VOID MOUSE EFFECT ==========
  const voidCanvas = document.getElementById('voidCanvas');
  const vCtx = voidCanvas.getContext('2d');

  let W, H, dpr;
  let mouse = { x: -500, y: -500 };
  let smoothMouse = { x: -500, y: -500 };
  let particles = [];

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    voidCanvas.width = W * dpr;
    voidCanvas.height = H * dpr;
    voidCanvas.style.width = W + 'px';
    voidCanvas.style.height = H + 'px';
    vCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', () => {
    resize();
    particles.forEach(p => p.spawn());
  });

  // Track mouse
  document.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  document.addEventListener('mouseleave', () => {
    mouse.x = -500;
    mouse.y = -500;
  });

  // Custom cursor
  const cursorDot = document.getElementById('cursorDot');

  function updateCursor() {
    cursorDot.style.left = mouse.x + 'px';
    cursorDot.style.top = mouse.y + 'px';
  }

  // ========== PARTICLE FIELD ==========
  class Particle {
    constructor() {
      this.spawn();
    }
    spawn() {
      // Home position — spread across entire viewport
      this.homeX = Math.random() * W;
      this.homeY = Math.random() * H;
      this.x = this.homeX;
      this.y = this.homeY;
      this.size = Math.random() * 1.4 + 0.3;
      this.baseAlpha = Math.random() * 0.25 + 0.04;
      this.alpha = this.baseAlpha;
      // Gentle ambient drift
      this.driftSpeed = 0.0003 + Math.random() * 0.0006;
      this.driftAngle = Math.random() * Math.PI * 2;
      this.driftRadius = 5 + Math.random() * 15;
      this.phase = Math.random() * Math.PI * 2;
    }
    update(time) {
      // Ambient floating motion
      const driftX = Math.cos(time * this.driftSpeed + this.phase) * this.driftRadius;
      const driftY = Math.sin(time * this.driftSpeed * 0.7 + this.phase) * this.driftRadius;
      let targetX = this.homeX + driftX;
      let targetY = this.homeY + driftY;

      // Repel from mouse
      const dx = this.x - smoothMouse.x;
      const dy = this.y - smoothMouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const repelRadius = 150;

      if (dist < repelRadius && dist > 0) {
        const force = (1 - dist / repelRadius) * 35;
        targetX -= (dx / dist) * force;
        targetY -= (dy / dist) * force;
        this.alpha = this.baseAlpha + (1 - dist / repelRadius) * 0.4;
      } else {
        this.alpha += (this.baseAlpha - this.alpha) * 0.03;
      }

      // Ease toward target
      this.x += (targetX - this.x) * 0.06;
      this.y += (targetY - this.y) * 0.06;
    }
    draw(ctx) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
      ctx.fill();
    }
  }

  // Initialize field
  for (let i = 0; i < 150; i++) particles.push(new Particle());

  // ========== GRID DISTORTION LINES ==========
  function drawDistortionGrid() {
    if (smoothMouse.x < -100) return;

    const spacing = 60;
    const cols = Math.ceil(W / spacing) + 1;
    const rows = Math.ceil(H / spacing) + 1;
    const warpRadius = 180;
    const warpStrength = 20;

    vCtx.strokeStyle = 'rgba(255, 255, 255, 0.018)';
    vCtx.lineWidth = 0.5;

    // Horizontal lines
    for (let r = 0; r < rows; r++) {
      vCtx.beginPath();
      for (let c = 0; c <= cols; c++) {
        let x = c * spacing;
        let y = r * spacing;
        const dx = x - smoothMouse.x;
        const dy = y - smoothMouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < warpRadius && dist > 0) {
          const force = (1 - dist / warpRadius) * warpStrength;
          x += (dx / dist) * force;
          y += (dy / dist) * force;
        }
        if (c === 0) vCtx.moveTo(x, y);
        else vCtx.lineTo(x, y);
      }
      vCtx.stroke();
    }

    // Vertical lines
    for (let c = 0; c < cols; c++) {
      vCtx.beginPath();
      for (let r = 0; r <= rows; r++) {
        let x = c * spacing;
        let y = r * spacing;
        const dx = x - smoothMouse.x;
        const dy = y - smoothMouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < warpRadius && dist > 0) {
          const force = (1 - dist / warpRadius) * warpStrength;
          x += (dx / dist) * force;
          y += (dy / dist) * force;
        }
        if (r === 0) vCtx.moveTo(x, y);
        else vCtx.lineTo(x, y);
      }
      vCtx.stroke();
    }
  }

  function animate(time) {
    smoothMouse.x += (mouse.x - smoothMouse.x) * 0.1;
    smoothMouse.y += (mouse.y - smoothMouse.y) * 0.1;

    vCtx.clearRect(0, 0, W, H);

    // Warped grid
    drawDistortionGrid();

    // Particle field
    particles.forEach(p => { p.update(time); p.draw(vCtx); });

    updateCursor();
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  // ========== WAITLIST ==========
  function handleSubmit() {
    const input = document.getElementById('emailInput');
    const email = input.value.trim();
    if (!email || !email.includes('@')) {
      input.style.outline = '1px solid #ff4444';
      setTimeout(() => input.style.outline = 'none', 2000);
      return;
    }
    document.getElementById('inputGroup').style.display = 'none';
    document.getElementById('successMsg').classList.add('visible');
    console.log('Waitlist signup:', email);
  }

  document.getElementById('emailInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>

</body>
</html>
