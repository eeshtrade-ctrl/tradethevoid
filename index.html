<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID Engine — Trade The Void</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #000000;
    --white: #ffffff;
    --gray-100: #f5f5f5;
    --gray-300: #a0a0a0;
    --gray-500: #666666;
    --gray-700: #2a2a2a;
    --gray-800: #1a1a1a;
    --gray-900: #0d0d0d;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    cursor: none;
  }

  /* Canvas */
  #voidCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* Custom cursor */
  .cursor-dot {
    position: fixed;
    width: 6px;
    height: 6px;
    background: var(--white);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .cursor-dot.visible { opacity: 1; }

  /* Diagonal line texture */
  .bg-lines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.012) 40px,
      rgba(255,255,255,0.012) 41px
    );
    pointer-events: none;
    z-index: 2;
  }

  /* Ambient light sweep */
  .light-sweep {
    position: fixed;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.015), transparent);
    pointer-events: none;
    z-index: 2;
    animation: sweep 12s ease-in-out infinite;
    animation-delay: 3s;
  }

  @keyframes sweep {
    0% { left: -60%; }
    40% { left: 100%; }
    100% { left: 100%; }
  }

  /* ===== CINEMATIC INTRO ===== */

  /* Opening line */
  .intro-line {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    z-index: 10;
    animation: lineExpand 1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards,
               lineFade 0.6s ease-out 1.6s forwards;
  }

  @keyframes lineExpand {
    to { width: min(500px, 70vw); }
  }

  @keyframes lineFade {
    to { opacity: 0; height: 0; }
  }

  /* Page content */
  .page {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
  }

  /* All content starts hidden */
  .logo-container,
  .divider,
  .waitlist,
  .footer {
    opacity: 0;
    transform: translateY(16px);
  }

  /* Cinematic staggered reveals */
  .logo-container {
    margin-bottom: 48px;
    animation: revealUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1.4s forwards;
  }

  .logo-container img {
    width: 500px;
    max-width: 85vw;
    height: auto;
    transition: filter 0.4s ease;
    animation: logoBreathe 6s ease-in-out infinite;
    animation-delay: 3s;
  }

  .logo-container:hover img {
    filter: brightness(1.15) drop-shadow(0 0 40px rgba(255,255,255,0.15));
  }

  @keyframes logoBreathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.88; }
  }

  .divider {
    width: 1px;
    height: 0;
    background: linear-gradient(to bottom, transparent, var(--gray-500), transparent);
    margin-bottom: 64px;
    animation: revealUp 0.6s ease-out 2.2s forwards,
               dividerGrow 1s cubic-bezier(0.22, 1, 0.36, 1) 2.2s forwards;
  }

  @keyframes dividerGrow {
    to { height: 60px; }
  }

  /* Divider subtle pulse */
  .divider::after {
    content: '';
    display: block;
    width: 1px;
    height: 100%;
    background: linear-gradient(to bottom, transparent, var(--gray-500), transparent);
    animation: dividerPulse 4s ease-in-out infinite;
    animation-delay: 4s;
  }

  @keyframes dividerPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .waitlist {
    text-align: center;
    max-width: 480px;
    width: 100%;
    animation: revealUp 1s cubic-bezier(0.22, 1, 0.36, 1) 2.7s forwards;
  }

  .waitlist-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gray-500);
    margin-bottom: 24px;
  }

  .waitlist-desc {
    font-size: 16px;
    font-weight: 300;
    color: var(--gray-300);
    line-height: 1.7;
    margin-bottom: 36px;
  }

  .input-group {
    display: flex;
    gap: 0;
    width: 100%;
    border: 1px solid var(--gray-700);
    border-radius: 2px;
    overflow: hidden;
    transition: border-color 0.3s ease;
  }

  .input-group:focus-within {
    border-color: var(--gray-300);
  }

  .input-group input {
    flex: 1;
    background: rgba(13,13,13,0.8);
    backdrop-filter: blur(10px);
    border: none;
    padding: 16px 20px;
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.02em;
    outline: none;
    cursor: none;
  }

  .input-group input::placeholder {
    color: var(--gray-500);
    letter-spacing: 0.05em;
  }

  .input-group button {
    background: var(--white);
    color: var(--black);
    border: none;
    padding: 16px 28px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: none;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .input-group button:hover {
    background: var(--gray-100);
  }

  .input-group button:active {
    transform: scale(0.98);
  }

  .success-msg {
    display: none;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--gray-300);
    margin-top: 20px;
    padding: 16px;
    border: 1px solid var(--gray-700);
    border-radius: 2px;
  }

  .success-msg.visible {
    display: block;
    animation: revealUp 0.5s ease-out forwards;
  }

  .footer {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    display: flex;
    gap: 32px;
    align-items: center;
    animation: revealUp 1s cubic-bezier(0.22, 1, 0.36, 1) 3.1s forwards;
  }

  .footer-link {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-500);
    text-decoration: none;
    transition: color 0.3s ease;
    cursor: none;
  }

  .footer-link:hover { color: var(--white); }

  .footer-dot {
    width: 3px;
    height: 3px;
    background: var(--gray-700);
    border-radius: 50%;
  }

  @keyframes revealUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 520px) {
    .input-group { flex-direction: column; }
    .input-group button { padding: 14px 20px; }
    .logo-container img { width: 340px; }
    .footer { gap: 20px; }
    body { cursor: auto; }
    .cursor-dot { display: none; }
  }
</style>
</head>
<body>

<canvas id="voidCanvas"></canvas>
<div class="bg-lines"></div>
<div class="light-sweep"></div>
<div class="cursor-dot" id="cursorDot"></div>

<!-- Cinematic opening line -->
<div class="intro-line"></div>

<main class="page">
  <div class="logo-container">
    <img src="void-logo.jpeg" alt="VOID Engine Logo">
  </div>

  <div class="divider"></div>

  <div class="waitlist">
    <p class="waitlist-label">Early Access</p>
    <p class="waitlist-desc">Autonomous orderflow intelligence for ES futures. Join the waitlist to get first access when we launch.</p>

    <div class="input-group" id="inputGroup">
      <input type="email" id="emailInput" placeholder="you@email.com" autocomplete="email" />
      <button id="submitBtn" onclick="handleSubmit()">Join Waitlist</button>
    </div>

    <div class="success-msg" id="successMsg">
      &#10003; &nbsp;You're on the list. We'll be in touch.
    </div>
  </div>

  <div class="footer">
    <a href="https://instagram.com/es.eesh" target="_blank" class="footer-link">Instagram</a>
    <div class="footer-dot"></div>
    <span class="footer-link">2026</span>
  </div>
</main>

<script>
  // ========== CANVAS SETUP ==========
  const voidCanvas = document.getElementById('voidCanvas');
  const vCtx = voidCanvas.getContext('2d');

  let W, H, dpr;
  let mouse = { x: -500, y: -500 };
  let smoothMouse = { x: -500, y: -500 };
  let particles = [];

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    voidCanvas.width = W * dpr;
    voidCanvas.height = H * dpr;
    voidCanvas.style.width = W + 'px';
    voidCanvas.style.height = H + 'px';
    vCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', () => {
    resize();
    particles.forEach(p => p.spawn());
  });

  // Track mouse
  document.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  document.addEventListener('mouseleave', () => {
    mouse.x = -500;
    mouse.y = -500;
  });

  // Show cursor after intro
  const cursorDot = document.getElementById('cursorDot');
  setTimeout(() => cursorDot.classList.add('visible'), 1600);

  function updateCursor() {
    cursorDot.style.left = mouse.x + 'px';
    cursorDot.style.top = mouse.y + 'px';
  }

  // ========== PARTICLE FIELD ==========
  class Particle {
    constructor(delay) {
      this.delay = delay;
      this.born = false;
      this.spawn();
    }
    spawn() {
      this.homeX = Math.random() * W;
      this.homeY = Math.random() * H;
      this.x = this.homeX;
      this.y = this.homeY;
      this.size = Math.random() * 1.4 + 0.3;
      this.baseAlpha = Math.random() * 0.25 + 0.04;
      this.alpha = 0;
      this.targetAlpha = 0;
      this.driftSpeed = 0.0003 + Math.random() * 0.0006;
      this.driftRadius = 5 + Math.random() * 15;
      this.phase = Math.random() * Math.PI * 2;
    }
    update(time, elapsed) {
      // Staggered fade-in
      if (!this.born) {
        if (elapsed > this.delay) this.born = true;
        else return;
      }

      // Ambient floating
      const driftX = Math.cos(time * this.driftSpeed + this.phase) * this.driftRadius;
      const driftY = Math.sin(time * this.driftSpeed * 0.7 + this.phase) * this.driftRadius;
      let targetX = this.homeX + driftX;
      let targetY = this.homeY + driftY;

      // Attract to mouse
      const dx = this.x - smoothMouse.x;
      const dy = this.y - smoothMouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const attractRadius = 150;

      if (dist < attractRadius && dist > 0) {
        const force = (1 - dist / attractRadius) * 35;
        targetX -= (dx / dist) * force;
        targetY -= (dy / dist) * force;
        this.targetAlpha = this.baseAlpha + (1 - dist / attractRadius) * 0.4;
      } else {
        this.targetAlpha = this.baseAlpha;
      }

      this.alpha += (this.targetAlpha - this.alpha) * 0.03;
      this.x += (targetX - this.x) * 0.06;
      this.y += (targetY - this.y) * 0.06;
    }
    draw(ctx) {
      if (!this.born || this.alpha < 0.005) return;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
      ctx.fill();
    }
  }

  // Stagger particle appearance across 2 seconds after intro
  for (let i = 0; i < 150; i++) {
    const delay = 1200 + Math.random() * 2000;
    particles.push(new Particle(delay));
  }

  // ========== CONNECTION LINES ==========
  function drawConnections() {
    const maxDist = 80;
    for (let i = 0; i < particles.length; i++) {
      if (!particles[i].born) continue;
      for (let j = i + 1; j < particles.length; j++) {
        if (!particles[j].born) continue;
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < maxDist) {
          const alpha = (1 - dist / maxDist) * 0.06 *
            Math.min(particles[i].alpha, particles[j].alpha) / 0.25;
          if (alpha < 0.003) continue;
          vCtx.beginPath();
          vCtx.moveTo(particles[i].x, particles[i].y);
          vCtx.lineTo(particles[j].x, particles[j].y);
          vCtx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
          vCtx.lineWidth = 0.4;
          vCtx.stroke();
        }
      }
    }
  }

  // ========== GRID DISTORTION ==========
  function drawDistortionGrid() {
    if (smoothMouse.x < -100) return;

    const spacing = 60;
    const cols = Math.ceil(W / spacing) + 1;
    const rows = Math.ceil(H / spacing) + 1;
    const warpRadius = 180;
    const warpStrength = 20;

    vCtx.strokeStyle = 'rgba(255, 255, 255, 0.018)';
    vCtx.lineWidth = 0.5;

    for (let r = 0; r < rows; r++) {
      vCtx.beginPath();
      for (let c = 0; c <= cols; c++) {
        let x = c * spacing;
        let y = r * spacing;
        const dx = x - smoothMouse.x;
        const dy = y - smoothMouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < warpRadius && dist > 0) {
          const force = (1 - dist / warpRadius) * warpStrength;
          x += (dx / dist) * force;
          y += (dy / dist) * force;
        }
        if (c === 0) vCtx.moveTo(x, y);
        else vCtx.lineTo(x, y);
      }
      vCtx.stroke();
    }

    for (let c = 0; c < cols; c++) {
      vCtx.beginPath();
      for (let r = 0; r <= rows; r++) {
        let x = c * spacing;
        let y = r * spacing;
        const dx = x - smoothMouse.x;
        const dy = y - smoothMouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < warpRadius && dist > 0) {
          const force = (1 - dist / warpRadius) * warpStrength;
          x += (dx / dist) * force;
          y += (dy / dist) * force;
        }
        if (r === 0) vCtx.moveTo(x, y);
        else vCtx.lineTo(x, y);
      }
      vCtx.stroke();
    }
  }

  // ========== RENDER ==========
  const startTime = performance.now();

  function animate(time) {
    const elapsed = time - startTime;
    smoothMouse.x += (mouse.x - smoothMouse.x) * 0.1;
    smoothMouse.y += (mouse.y - smoothMouse.y) * 0.1;

    vCtx.clearRect(0, 0, W, H);

    drawDistortionGrid();
    particles.forEach(p => { p.update(time, elapsed); p.draw(vCtx); });
    drawConnections();

    updateCursor();
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  // ========== WAITLIST ==========
  function handleSubmit() {
    const input = document.getElementById('emailInput');
    const email = input.value.trim();
    if (!email || !email.includes('@')) {
      input.style.outline = '1px solid #ff4444';
      setTimeout(() => input.style.outline = 'none', 2000);
      return;
    }
    document.getElementById('inputGroup').style.display = 'none';
    document.getElementById('successMsg').classList.add('visible');
    console.log('Waitlist signup:', email);
  }

  document.getElementById('emailInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>

</body>
</html>
